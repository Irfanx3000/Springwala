<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist | Springwala</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/config.js"></script>
</head>

<body class="bg-[#F8F9FA] text-gray-900 font-['Roboto']" data-page="wishlist">

    <!-- Navbar Snippet (Standard Header) -->
    <header class="bg-white border-b border-[#E8E8E8] sticky top-0 z-50">
        <div class="hidden md:flex max-w-[1440px] mx-auto items-center justify-between px-[80px] h-[73px]">
            <a href="index.html"><img src="assets/images/header.png" alt="Logo" class="h-[40px] w-auto"></a>

            <div class="flex-1 max-w-[519px] mx-10 flex h-[40px]">
                <div class="flex-1 border border-[#D7D9D9] rounded-[6px] flex items-center px-3 bg-white">
                    <input type="text" class="flex-1 outline-none text-[13px]" placeholder="Search Products...">
                    <img src="assets/icons/desktop/search.svg" alt="Search" class="w-5 h-5 text-[#797979]">
                </div>
            </div>

            <div class="flex items-center gap-7">
                <a href="login.html" class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition">
                    <img src="assets/icons/desktop/profile.svg" alt="Account" class="w-6 h-6 text-[#525252]">
                    <span class="text-[#525252] text-[15px]">Account</span>
                </a>
                <a href="cart.html" class="cursor-pointer hover:opacity-80 transition relative">
                    <img src="assets/icons/desktop/cart.svg" alt="Cart" class="w-6 h-6 text-[#525252]">
                    <span class="cart-badge absolute -top-1 -right-1 bg-[#BE2229] text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center" style="display:none;">0</span>
                </a>
                <a href="wishlist.html" class="cursor-pointer hover:opacity-80 transition relative">
                    <img src="assets/icons/desktop/saved-items.svg" alt="Wishlist" class="w-6 h-6 text-[#525252]">
                    <span class="wishlist-badge absolute -top-1 -right-1 bg-[#BE2229] text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center" style="display:none;">0</span>
                </a>
            </div>
        </div>
        
        <!-- Mobile Header -->
        <div class="flex md:hidden relative w-full h-[51px] bg-white border-b border-[#E8E8E8] items-center px-4">
            <a href="index.html" class="w-[120px]"><img src="assets/images/header.png" alt="Logo" class="w-full object-contain"></a>
            <div class="ml-auto flex gap-4">
                <a href="wishlist.html" class="relative">
                    <img src="assets/icons/desktop/saved-items.svg" class="w-6 h-6" alt="Wishlist">
                    <span class="wishlist-badge absolute -top-1 -right-1 bg-[#BE2229] text-white text-[8px] font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center" style="display:none;">0</span>
                </a>
                <a href="cart.html" class="relative">
                    <img src="assets/icons/mobile/cart.svg" class="w-6 h-6" alt="Cart">
                    <span class="cart-badge absolute -top-1 -right-1 bg-[#BE2229] text-white text-[8px] font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center" style="display:none;">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-[1440px] mx-auto px-4 md:px-[80px] py-10 min-h-[600px]">
        <div class="flex flex-col gap-2 mb-8">
            <h1 class="text-2xl md:text-3xl font-bold font-poppins">My Wishlist</h1>
            <p class="text-gray-500 text-sm md:text-base">View and manage the products you've saved for later.</p>
        </div>

        <!-- Wishlist Grid -->
        <div id="wishlist-grid" class="grid grid-cols-2 lg:grid-cols-5 gap-4 md:gap-6">
            <!-- Products will be injected here -->
            <div class="col-span-full py-20 flex flex-col items-center justify-center text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#BE2229] mb-4"></div>
                <p class="text-gray-500">Loading your wishlist...</p>
            </div>
        </div>

        <!-- Empty State (hidden by default) -->
        <div id="wishlist-empty" class="hidden col-span-full py-20 flex flex-col items-center justify-center text-center">
            <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-6">
                <img src="assets/icons/desktop/saved-items.svg" class="w-12 h-12 opacity-30" alt="Empty">
            </div>
            <h2 class="text-xl font-bold mb-2">Your Wishlist is Empty</h2>
            <p class="text-gray-500 mb-8 max-w-xs">Looks like you haven't saved any items yet. Start exploring our categories!</p>
            <a href="allproducts.html" class="bg-[#BE2229] text-white px-8 py-3 rounded-md font-medium hover:bg-opacity-90 transition shadow-lg">Start Shopping</a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-[#E8E8E8] pt-12 pb-24 md:pb-12 mt-20">
        <div class="max-w-[1440px] mx-auto px-4 md:px-[80px] text-center">
            <img src="assets/images/header.png" alt="Logo" class="h-10 mx-auto mb-6 opacity-80">
            <p class="text-gray-500 text-sm">© 2026 Springwala. All rights reserved.</p>
        </div>
    </footer>

    <!-- Mobile Navbar -->
    <nav class="mobile-navbar">
        <a href="index.html" class="nav-item">
            <img src="assets/icons/mobile/home.svg" alt="Home">
        </a>
        <a href="categories.html" class="nav-item">
            <img src="assets/icons/mobile/categories.svg" alt="Categories">
        </a>
        <a href="wishlist.html" class="nav-item active">
            <img src="assets/icons/desktop/saved-items.svg" class="w-6 h-6 grayscale brightness-0 invert-[0.3]" alt="Wishlist">
            <div class="active-indicator"></div>
        </a>
        <a href="orders.html" class="nav-item">
            <img src="assets/icons/mobile/orders.svg" alt="Orders">
        </a>
        <a href="login.html" class="nav-item">
            <img src="assets/icons/mobile/profile.svg" alt="Profile">
        </a>
    </nav>

    <script src="assets/js/script.js"></script>
    <script src="assets/js/app.js"></script>
</body>

</html>
