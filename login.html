        body {
            margin: 0;

            background-color: #F4F6F6;

        /* Auto Slider CSS Animation */
        .slide {
            opacity: 0;
            transition: opacity 1s ease-in-out;
            position: absolute;
            inset: 0;
        }

        .slide.active {
            opacity: 1;
            z-index: 10;
        }

        .indicator {
            width: 24px;
            height: 4px;
            border-radius: 9999px;
            background-color: #D9D9D9;
            transition: all 0.3s;
            cursor: pointer;
        }

        .indicator.active {
            background-color: #625656;
        }

        /* Ensures the container fits on smaller latpop screens without scrolling body */
        .responsive-container {
            width: 100%;
            max-width: 1110px;
            height: calc(100vh - 40px);
            max-height: 743px;
        }

        /* Mobile specific overrides */
        @media (max-width: 1023px) {
            .responsive-container {
                max-width: 428px;
                height: calc(100vh - 32px);
                max-height: 900px;
            }
        }

        /* Hide scrollbar for auth panels but allow scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Loading state for buttons */
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-loading::after {
            content: " ...";
        }
    </style>

    <script>
        // API Configuration
        const API_BASE_URL = CONFIG.API_BASE_URL;
        
        // Check for Google OAuth callback on page load
        
        let currentOTPIdentifier = null;
        let currentOTPChannel = null;
        
        // Helper function to make API requests
        async function apiRequest(endpoint, method, data) {
            const url = `${API_BASE_URL}${endpoint}`;
            const options = {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            };
            
            const response = await fetch(url, options);
            const result = await response.json();
            
            if (!response.ok) {
                throw new Error(result.message || 'Something went wrong');
            }
            
            return result;
        }
        
        // Store token in localStorage
        function storeToken(token, user = null) {
            localStorage.setItem('token', token);
            localStorage.setItem('userToken', token); // Compatibility
            if (user) {
                localStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('springwalaUser', JSON.stringify(user)); // Compatibility
            }
        }
        
        function getToken() {
            return localStorage.getItem('token') || localStorage.getItem('userToken');
        }
        
        function clearToken() {
            localStorage.removeItem('token');
            localStorage.removeItem('userToken');
            localStorage.removeItem('user');
            localStorage.removeItem('springwalaUser');
        }
        
        // Show notification using SweetAlert
        function showNotification(title, message, type = 'success') {
            Swal.fire({
                title: title,
                text: message,
                icon: type,
                confirmButtonColor: '#BE2229',
                timer: type === 'success' ? 3000 : 5000,
                timerProgressBar: true
            });
        }
        
        // Show OTP verification modal with channel support
        async function showOTPModal(identifier, channel = 'email') {
            currentOTPIdentifier = identifier;
            currentOTPChannel = channel;
            
            const result = await Swal.fire({
                title: 'Verify Your Account',
                html: `
                    <p style="margin-bottom: 15px;">We've sent a verification code via <strong>${channel.toUpperCase()}</strong> to:</p>
                    <strong style="color: #BE2229; word-break: break-all;">${identifier}</strong>
                    <input type="text" id="otpInput" class="swal2-input" placeholder="Enter 6-digit OTP" maxlength="6" style="margin-top: 15px; text-align: center; font-size: 20px; letter-spacing: 5px;">
                    <button id="resendOtpBtn" style="margin-top: 15px; background: none; border: none; color: #BE2229; cursor: pointer; text-decoration: underline;">Resend OTP</button>
                `,
                confirmButtonText: 'Verify',
                cancelButtonText: 'Cancel',
                showCancelButton: true,
                confirmButtonColor: '#BE2229',
                didOpen: () => {
                    const resendBtn = document.getElementById('resendOtpBtn');
                    if (resendBtn) {
                        resendBtn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            Swal.showLoading();
                            try {
                                const resendResult = await apiRequest('/auth/resend-otp', 'POST', { identifier: currentOTPIdentifier });
                                Swal.close();
                                if (resendResult.devOTP) {
                                    await Swal.fire({
                                        title: 'Development Mode',
                                        text: `Your new OTP is: ${resendResult.devOTP}`,
                                        icon: 'info',
                                        confirmButtonColor: '#BE2229'
                                    });
                                } else {
                                    showNotification('OTP Resent', `New verification code sent via ${(resendResult.channel || channel).toUpperCase()}`, 'success');
                                }
                                setTimeout(() => showOTPModal(currentOTPIdentifier, resendResult.channel || channel), 500);
                            } catch (error) {
                                Swal.close();
                                showNotification('Failed', error.message, 'error');
                            }
                        });
                    }
                },
                preConfirm: () => {
                    const otp = document.getElementById('otpInput')?.value;
                    if (!otp || otp.length !== 6) {
                        Swal.showValidationMessage('Please enter a valid 6-digit OTP');
                        return false;
                    }
                    if (!/^\d+$/.test(otp)) {
                        Swal.showValidationMessage('OTP must contain only numbers');
                        return false;
                    }
                    return otp;
                }
            });
            
            if (result.isConfirmed && result.value) {
                try {
                    const verifyResult = await apiRequest('/auth/verify-otp', 'POST', { 
                        identifier: currentOTPIdentifier, 
                        otp: result.value 
                    });
                    
                    if (verifyResult.success) {
                        storeToken(verifyResult.token, verifyResult.user);
                        // Merge guest cart after verification
                        if (typeof Cart !== 'undefined' && Cart.mergeGuestCart) {
                            await Cart.mergeGuestCart();
                        }
                        showNotification('Success!', 'Account verified successfully! Redirecting...', 'success');
                        
                        // Post-login redirect logic
                        const redirect = localStorage.getItem("redirectAfterLogin");
                        if (redirect) {
                            localStorage.removeItem("redirectAfterLogin");
                            setTimeout(() => {
                                window.location.href = redirect;
                            }, 2000);
                        } else {
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 2000);
                        }
                    }
                } catch (error) {
                    showNotification('Verification Failed', error.message, 'error');
                    if (!error.message.includes('expired') && !error.message.includes('attempts')) {
                        setTimeout(() => showOTPModal(currentOTPIdentifier, currentOTPChannel), 1000);
                    }
                }
            }
        }
        
        // REGISTER FUNCTIONALITY - Complete with SMS/Email support
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const firstName = document.getElementById('regFirstName').value.trim();
            const lastName = document.getElementById('regLastName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const phoneNumber = document.getElementById('regPhoneNumber').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            // Get OTP preference
            let otpPreference = 'email';
            const smsRadio = document.querySelector('input[name="otpPreference"][value="sms"]');
            if (smsRadio && smsRadio.checked) {
                otpPreference = 'sms';
            }
            
            // Validation
            if (!firstName || !lastName || !password) {
                showNotification('Missing Fields', 'First name, last name, and password are required', 'error');
                return;
            }
            
            if (!email && !phoneNumber) {
                showNotification('Missing Contact', 'Please provide either email OR phone number', 'error');
                return;
            }
            
            if (email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showNotification('Invalid Email', 'Please enter a valid email address', 'error');
                    return;
                }
            }
            
            if (phoneNumber) {
                const phoneRegex = /^\d{10}$/;
                if (!phoneRegex.test(phoneNumber)) {
                    showNotification('Invalid Phone', 'Please enter a valid 10-digit phone number', 'error');
                    return;
                }
            }
            
            if (password !== confirmPassword) {
                showNotification('Password Mismatch', 'Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showNotification('Weak Password', 'Password must be at least 6 characters', 'error');
                return;
            }
            
            const btn = document.getElementById('registerBtn');
            const originalText = btn.textContent;
            btn.classList.add('btn-loading');
            btn.textContent = 'Sending OTP...';
            
            try {
                const requestBody = { firstName, lastName, password, otpPreference };
                if (email) requestBody.email = email;
                if (phoneNumber) requestBody.phoneNumber = phoneNumber;
                
                const result = await apiRequest('/auth/register', 'POST', requestBody);
                
                if (result.success) {
                    const identifier = result.identifier || (email || phoneNumber);
                    const channel = result.channel || otpPreference;
                    
                    if (result.devOTP) {
                        await Swal.fire({
                            title: '🔐 Development Mode',
                            html: `
                                <p>OTP sent via <strong>${channel.toUpperCase()}</strong></p>
                                <p>Your verification code is:</p>
                                <h1 style="color: #BE2229; font-size: 48px; letter-spacing: 10px; margin: 20px;">${result.devOTP}</h1>
                                <p>Using identifier: <strong>${identifier}</strong></p>
                                <p style="font-size: 12px; color: #666;">In production, this would be sent to your ${channel}.</p>
                            `,
                            icon: 'info',
                            confirmButtonColor: '#BE2229'
                        });
                    } else {
                        showNotification('OTP Sent', `Verification code sent via ${channel.toUpperCase()}`, 'success');
                    }
                    
                    await showOTPModal(identifier, channel);
                }
            } catch (error) {
                showNotification('Registration Failed', error.message, 'error');
            } finally {
                btn.classList.remove('btn-loading');
                btn.textContent = originalText;
            }
        });
        
        // LOGIN FUNCTIONALITY - Supports both email and phone
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const identifier = document.getElementById('loginIdentifier').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;
            
            if (!identifier || !password) {
                showNotification('Missing Fields', 'Please enter email/phone and password', 'error');
                return;
            }
            
            const btn = document.getElementById('loginBtn');
            const originalText = btn.textContent;
            btn.classList.add('btn-loading');
            btn.textContent = 'Logging in...';
            
            try {
                const result = await apiRequest('/auth/login', 'POST', { identifier, password });
                
                if (result.success) {
                    storeToken(result.token, result.user);
                    // Merge guest cart after login
                    if (typeof Cart !== 'undefined' && Cart.mergeGuestCart) {
                        await Cart.mergeGuestCart();
                    }
                    showNotification('Welcome Back!', `Hello ${result.user.firstName}! Redirecting...`, 'success');
                    
                    // Post-login redirect logic
                    const redirect = localStorage.getItem("redirectAfterLogin");
                    if (redirect) {
                        localStorage.removeItem("redirectAfterLogin");
                        setTimeout(() => {
                            window.location.href = redirect;
                        }, 1500);
                    } else {
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                    }
                }
            } catch (error) {
                if (error.message.toLowerCase().includes('verify')) {
                    showNotification('Account Not Verified', 'Please verify your account first.', 'warning');
                    await showOTPModal(identifier, 'email');
                } else {
                    showNotification('Login Failed', error.message, 'error');
                }
            } finally {
                btn.classList.remove('btn-loading');
                btn.textContent = originalText;
            }
        });
        
        // FORGOT PASSWORD - Send Reset Link (supports email and phone)
        document.getElementById('sendResetLinkBtn').addEventListener('click', async () => {
            const identifier = document.getElementById('forgotIdentifier').value.trim().toLowerCase();
            
            if (!identifier) {
                showNotification('Missing Information', 'Please enter your email address or phone number', 'error');
                return;
            }
            
            const btn = document.getElementById('sendResetLinkBtn');
            const originalText = btn.textContent;
            btn.classList.add('btn-loading');
            btn.textContent = 'Sending...';
            
            try {
                const result = await apiRequest('/auth/forgot-password', 'POST', { identifier });
                
                if (result.success) {
                    showNotification('Reset Link Sent', result.message || 'If an account exists, a password reset link has been sent.', 'success');
                    document.getElementById('forgotIdentifier').value = '';
                    setTimeout(() => slideAuth(0), 3000);
                }
            } catch (error) {
                showNotification('Failed', error.message, 'error');
            } finally {
                btn.classList.remove('btn-loading');
                btn.textContent = originalText;
            }
        });
        
        // GOOGLE LOGIN FUNCTIONALITY
        function handleGoogleLogin() {
            window.location.href = `${API_BASE_URL}/auth/google`;
        }
        
        document.getElementById('googleLoginBtn')?.addEventListener('click', handleGoogleLogin);
        document.getElementById('googleRegisterBtn')?.addEventListener('click', handleGoogleLogin);
        
        // Check for Google OAuth callback on page load
        (function checkGoogleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const error = urlParams.get('error');
            
            if (token) {
                // If Google OAuth returns user data too, store it. 
                // Usually it returns token, and we might need to fetch profile.
                // For now, let's just store the token. validateUser will fetch profile later.
                storeToken(token);
                // Merge guest cart
                if (typeof Cart !== 'undefined' && Cart.mergeGuestCart) {
                    Cart.mergeGuestCart();
                }
                showNotification('Google Login Successful', 'Welcome! Redirecting...', 'success');
                
                // Post-login redirect logic
                const redirect = localStorage.getItem("redirectAfterLogin");
                if (redirect) {
                    localStorage.removeItem("redirectAfterLogin");
                    setTimeout(() => {
                        window.location.href = redirect;
                    }, 1500);
                } else {
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            } else if (error) {
                showNotification('Google Login Failed', 'Please try again', 'error');
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        })();
        
        // Auto Slider and Panel Animation
        function slideAuth(index) {
            const authSlider = document.getElementById('auth-slider');
            const imagePanel = document.getElementById('slider-container');
            const formPanel = document.getElementById('form-container');

            if (authSlider) {
                const percentage = -(index * 33.333333);
                authSlider.style.transform = `translateX(${percentage}%)`;
            }

            if (window.innerWidth >= 1024) {
                if (index === 1) {
                    if (imagePanel && formPanel) {
                        imagePanel.style.transform = 'translateX(100%)';
                        formPanel.style.transform = 'translateX(-100%)';
                    }
                } else {
                    if (imagePanel && formPanel) {
                        imagePanel.style.transform = 'translateX(0)';
                        formPanel.style.transform = 'translateX(0)';
                    }
                }
            } else {
                if (imagePanel && formPanel) {
                    imagePanel.style.transform = 'none';
                    formPanel.style.transform = 'none';
                }
            }
        }
        
        // Check if user is already logged in
        function checkAuthAndRedirect() {
            const token = getToken();
            if (token) {
                fetch(`${API_BASE_URL}/user/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => {
                    if (res.ok) {
                        window.location.href = 'index.html';
                    } else if (res.status === 401) {
                        clearToken();
                    }
                }).catch(() => {});
            }
        }
        
        // Image Slider Functionality
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthAndRedirect();
            
            const slides = document.querySelectorAll('.slide');
            const indicators = document.querySelectorAll('.indicator');
            let currentSlide = 0;
            const slideInterval = 4000;
            let slideTimer;

            function goToSlide(index) {
                if (!slides.length) return;
                slides[currentSlide].classList.remove('active');
                indicators[currentSlide].classList.remove('active');
                currentSlide = index;
                slides[currentSlide].classList.add('active');
                indicators[currentSlide].classList.add('active');
            }

            function nextSlide() {
                let nextIndex = (currentSlide + 1) % slides.length;
                goToSlide(nextIndex);
            }

            function startSlider() {
                if (slides.length > 0) {
                    slideTimer = setInterval(nextSlide, slideInterval);
                }
            }

            indicators.forEach(indicator => {
                indicator.addEventListener('click', (e) => {
                    const slideIndex = parseInt(e.target.getAttribute('data-slide'));
                    clearInterval(slideTimer);
                    goToSlide(slideIndex);
                    startSlider();
                });
            });

            startSlider();

            // Password Eye Toggle Functionality
            function setupPasswordToggle(btnId, inputId, iconId) {
                const btn = document.getElementById(btnId);
                const input = document.getElementById(inputId);
                const icon = document.getElementById(iconId);

                const eyeSlashSVG = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/><path d="M2.71 3.16c-.39.39-.39 1.02 0 1.41l16.32 16.33c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L4.12 3.16c-.39-.39-1.02-.39-1.41 0z" fill="gray"/>';
                const eyeSVG = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />';

                if (btn && input && icon) {
                    btn.addEventListener('click', function (e) {
                        e.preventDefault();
                        const isPassword = input.getAttribute('type') === 'password';
                        input.setAttribute('type', isPassword ? 'text' : 'password');
                        btn.style.opacity = isPassword ? '1' : '0.5';
                        icon.innerHTML = isPassword ? eyeSlashSVG : eyeSVG;
                    });
                }
            }

            setupPasswordToggle('togglePasswordBtn', 'loginPassword', 'eyeIcon');
            setupPasswordToggle('toggleRegPasswordBtn', 'regPassword', 'eyeIconReg');
            setupPasswordToggle('toggleRegConfirmBtn', 'regConfirmPassword', 'eyeIconRegConf');
        });
        
        // Enter key support
        document.getElementById('loginPassword')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('loginIdentifier')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('forgotIdentifier')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('sendResetLinkBtn').click();
        });
    </script>
</body>
