<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Springwala</title>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="assets/js/config.js"></script>
    <style>
        /* CSS RESET & VARIABLES */
        :root {
            --primary: #D6241E;
            --primary-hover: #b81c17;
            --primary-light: #fdf2f2;
            --primary-border: rgba(214, 36, 30, 0.3);
            --bg-body: #f8f9fa;
            --white: #ffffff;
            --charcoal: #111827;
            --text-muted: #6b7280;
            --border-light: #f3f4f6;
            --border: #e5e7eb;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.06);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.02);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--charcoal);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* CONTAINER CARD */
        .container {
            width: 100%;
            max-width: 1080px;
            background-color: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* MAIN HERO SECTION (2 Columns on Desktop) */
        .hero-section {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            padding: 64px 80px 48px 80px;
            gap: 60px;
            align-items: center;
        }

        /* LEFT COLUMN: TYPOGRAPHY & CTAs */
        .content-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .stay-tuned {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 6px;
            display: inline-block;
        }

        .stay-tuned::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 32px;
            height: 2px;
            background-color: var(--primary);
        }

        .main-title {
            font-size: 2.75rem;
            font-weight: 800;
            line-height: 1.2;
            color: var(--charcoal);
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .main-title span {
            color: var(--primary);
        }

        .description {
            font-size: 1.05rem;
            color: var(--text-muted);
            font-weight: 500;
            max-width: 480px;
            margin-bottom: 32px;
        }

        /* MESSAGE BOX */
        .message-box {
            background-color: var(--primary-light);
            border: 1.5px solid var(--primary-border);
            border-radius: var(--radius-md);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 460px;
            margin-bottom: 28px;
        }

        .message-box svg {
            width: 24px;
            height: 24px;
            color: var(--primary);
            flex-shrink: 0;
        }

        .message-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--charcoal);
        }

        .message-text span {
            color: var(--primary);
            font-weight: 700;
            margin-right: 4px;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--white);
            box-shadow: 0 4px 14px rgba(214, 36, 30, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(214, 36, 30, 0.3);
        }

        .btn-primary svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* RIGHT COLUMN: LAPTOP ILLUSTRATION */
        .graphic-panel {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .coming-soon-character-img {
            width: 100%;
            height: auto;
            max-width: 380px;
            display: block;
            margin: 0 auto;
        }

        /* LOWER SUPPORT BANNER */
        .support-banner {
            background-color: var(--bg-body);
            border-top: 1px solid var(--border-light);
            padding: 32px 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .support-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .support-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--primary-light);
            border: 1px solid var(--primary-border);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .support-icon-wrapper svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .support-text-block {
            display: flex;
            flex-direction: column;
        }

        .support-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--charcoal);
            margin-bottom: 2px;
        }

        .support-desc {
            font-size: 0.88rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* NEWSLETTER FORM */
        .notify-form {
            display: flex;
            gap: 12px;
            align-items: center;
            width: 100%;
            max-width: 460px;
        }

        .notify-input {
            flex: 1;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            font-family: var(--font-family);
            font-size: 0.95rem;
            font-weight: 500;
            background-color: var(--white);
            color: var(--charcoal);
            outline: none;
            transition: var(--transition);
        }

        .notify-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(214, 36, 30, 0.08);
        }

        .btn-notify {
            background-color: var(--primary);
            color: var(--white);
            padding: 14px 24px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            gap: 6px;
        }

        .btn-notify:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(214, 36, 30, 0.2);
        }

        /* RESPONSIVE STYLING (MOBILE BREAKPOINT) */
        @media (max-width: 992px) {
            body {
                padding: 16px;
            }

            .container {
                border-radius: var(--radius-md);
            }

            .hero-section {
                grid-template-columns: 1fr;
                padding: 40px 32px 32px 32px;
                gap: 40px;
                text-align: center;
            }

            .content-panel {
                align-items: center;
                text-align: center;
                order: 2;
                /* Graphic at the top for mobile layout */
            }

            .graphic-panel {
                order: 1;
                /* Graphic at the top for mobile layout */
            }

            .stay-tuned {
                margin-bottom: 16px;
            }

            .stay-tuned::after {
                left: 50%;
                transform: translateX(-50%);
            }

            .main-title {
                font-size: 2rem;
                margin-bottom: 16px;
            }

            .description {
                font-size: 0.95rem;
                margin-bottom: 24px;
            }

            .message-box {
                margin-left: auto;
                margin-right: auto;
                padding: 14px 20px;
            }

            .btn-primary {
                width: 100%;
                max-width: 460px;
            }

            .support-banner {
                flex-direction: column;
                padding: 32px 24px;
                text-align: center;
                gap: 20px;
            }

            .support-info {
                flex-direction: column;
                gap: 12px;
            }

            .notify-form {
                flex-direction: column;
                width: 100%;
                max-width: 460px;
                gap: 12px;
            }

            .notify-input {
                width: 100%;
            }

            .btn-notify {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Hero Section -->
        <main class="hero-section">

            <!-- Left Panel -->
            <div class="content-panel">
                <span class="stay-tuned">Stay Tuned</span>
                <h1 class="main-title">Something <span>Amazing</span> is Coming Soon!</h1>
                <p class="description">
                    We're working hard to bring you something exciting. Stay tuned!
                </p>

                <!-- Information Alert Box -->
                <div class="message-box">
                    <!-- Calendar Icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <div class="message-text">
                        <span>It will be live soon.</span> Thank you for your patience!
                    </div>
                </div>

                <!-- Back to Homepage CTA -->
                <a href="index.html" class="btn btn-primary">
                    <!-- Home Icon -->
                    <svg viewBox="0 0 24 24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Go Back Home
                </a>
            </div>

            <!-- Right Panel (Coming Soon Graphic) -->
            <div class="graphic-panel">
                <img src="assets/images/Charachter soon.png" alt="Springwala Coming Soon Character" class="coming-soon-character-img">
            </div>

        </main>

        <!-- Lower Newsletter Strip -->
        <footer class="support-banner">
            <div class="support-info">
                <!-- Mail Circle Icon -->
                <div class="support-icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>
                <div class="support-text-block">
                    <span class="support-title">Stay Updated</span>
                    <span class="support-desc">Enter your email to stay updated.</span>
                </div>
            </div>

            <!-- Email Signup Form -->
            <form id="notify-form" class="notify-form">
                <input type="email" id="notify-email" class="notify-input" placeholder="Enter your email address"
                    required>
                <button type="submit" class="btn-notify">
                    <!-- Bell Icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" style="width: 16px; height: 16px; stroke: currentColor; fill: none;">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    Notify Me
                </button>
            </form>
        </footer>

    </div>

    <!-- Signup Form Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('notify-form');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const emailInput = document.getElementById('notify-email');
                    const submitButton = form.querySelector('.btn-notify');
                    const email = emailInput.value.trim();

                    if (!email) return;

                    if (submitButton) {
                        submitButton.disabled = true;
                        submitButton.style.opacity = '0.7';
                        submitButton.textContent = 'Submitting...';
                    }

                    try {
                        const apiBase = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL)
                            ? CONFIG.API_BASE_URL
                            : `${window.location.origin}/api`;

                        const response = await fetch(`${apiBase}/inquiries/coming-soon`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email,
                                sourcePage: window.location.pathname.split('/').pop() || 'coming-soon.html'
                            })
                        });

                        const data = await response.json().catch(() => ({}));
                        if (!response.ok || !data.success) {
                            throw new Error(data.message || 'Unable to submit your email right now.');
                        }

                        // Display success state inside form
                        form.innerHTML = `
                            <div class="success-message" style="display: flex; align-items: center; gap: 8px; color: #16a34a; font-weight: 700; font-size: 0.95rem;">
                                <!-- Success Check SVG -->
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                Thank you! You've been added to our list.
                            </div>
                        `;
                    } catch (error) {
                        if (submitButton) {
                            submitButton.disabled = false;
                            submitButton.style.opacity = '';
                            submitButton.innerHTML = `
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                    stroke-linejoin="round" style="width: 16px; height: 16px; stroke: currentColor; fill: none;">
                                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                                </svg>
                                Notify Me
                            `;
                        }
                        emailInput.setCustomValidity(error.message);
                        emailInput.reportValidity();
                        emailInput.setCustomValidity('');
                    }
                });
            }
        });
    </script>
</body>

</html>
