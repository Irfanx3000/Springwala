<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Springwala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .confirmation-card {
            max-width: 420px;
            width: 100%;
            border-radius: 16px;
            padding: 32px 24px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: popIn 0.3s ease;
            text-align: center;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            width: 70px;
            height: 70px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            margin: 0 auto 16px;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #111;
            margin-bottom: 8px;
            font-family: 'Poppins', sans-serif;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .order-box {
            padding: 16px;
            border-radius: 12px;
            background: #f9fafb;
            text-align: left;
            border: 1px solid #f1f5f9;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .order-row:last-child { margin-bottom: 0; }

        .label { color: #64748b; font-weight: 500; }
        .value { color: #1e293b; font-weight: 600; }
        .order-id { color: #dc2626; font-weight: 700; }
        .status-badge {
            background: #dcfce7;
            color: #166534;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .primary-btn {
            width: 100%;
            background: #dc2626;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 24px;
            transition: background 0.2s;
            display: block;
            text-decoration: none;
        }

        .primary-btn:hover { background: #b91c1c; }

        .secondary-btn {
            width: 100%;
            color: #64748b;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 8px;
            display: block;
            text-decoration: none;
        }

        .secondary-btn:hover { color: #1e293b; }
    </style>
</head>
<body>
    <div class="confirmation-card">
        <div class="success-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        
        <h1 class="title">Order Confirmed!</h1>
        <p class="subtitle">
            Hooray! Your order has been placed. We've sent a confirmation email with your invoice.
        </p>
        
        <div class="order-box">
            <div class="order-row">
                <span class="label">Order ID</span>
                <span id="display-order-id" class="order-id">SW000000</span>
            </div>
            <div class="order-row">
                <span class="label">Amount Payable</span>
                <span id="display-order-amount" class="value">₹0.00</span>
            </div>
            <div class="order-row">
                <span class="label">Status</span>
                <span id="display-status" class="status-badge">Pending (COD)</span>
            </div>
            <div class="order-row" id="awb-row" style="display: none;">
                <span class="label">Tracking ID</span>
                <span id="display-awb" class="value">---</span>
            </div>
            <div class="order-row" id="tracking-row" style="display: none;">
                <span class="label">Track Link</span>
                <a id="display-tracking-link" href="#" target="_blank" class="value text-blue-600 underline">Track Now</a>
            </div>
        </div>
        
        <a id="track-order-btn" href="orders.html" class="primary-btn">Track My Order</a>
        <a href="index.html" class="secondary-btn">Continue Shopping</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        const amount = params.get('amount');
        const isPaid = params.get('payment') === 'success';
        const awb = params.get('awb');
        const trackingUrl = params.get('tracking');
        
        if (orderId) {
            document.getElementById('display-order-id').textContent = orderId;
        }

        if (amount) {
            document.getElementById('display-order-amount').textContent = '₹' + parseFloat(amount).toFixed(2);
        }

        if (isPaid) {
            const statusEl = document.getElementById('display-status');
            statusEl.textContent = 'Completed (Online)';
            statusEl.style.background = '#dcfce7';
            statusEl.style.color = '#166534';
        }

        if (awb) {
            document.getElementById('awb-row').style.display = 'flex';
            document.getElementById('display-awb').textContent = awb;
            
            // Dynamic link to new track-order page
            const trackBtn = document.getElementById('track-order-btn');
            if (trackBtn) trackBtn.href = `track-order.html?awb=${awb}`;
        }

        if (trackingUrl) {
            document.getElementById('tracking-row').style.display = 'flex';
            document.getElementById('display-tracking-link').href = decodeURIComponent(trackingUrl);
        }
    </script>
</body>
</html>
